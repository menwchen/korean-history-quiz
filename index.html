<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>한국사 퀴즈 - 주관식으로 실력 테스트</title>
<meta name="description" content="한국사 전 범위 주관식 퀴즈. 선사시대부터 현대까지 왕과 업적을 직접 써서 맞춰보세요.">
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700;900&display=swap');
  * { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color: transparent; }
  html { font-size: 16px; -webkit-text-size-adjust: 100%; }
  body {
    font-family: 'Noto Sans KR', sans-serif;
    background: linear-gradient(135deg, #0f0c29 0%, #302b63 50%, #24243e 100%);
    min-height: 100vh; min-height: 100dvh;
    color: #e0e0e0;
    padding: env(safe-area-inset-top) env(safe-area-inset-right) env(safe-area-inset-bottom) env(safe-area-inset-left);
  }
  .hero { text-align: center; padding: 80px 24px 40px; }
  .hero h1 {
    font-size: clamp(2em, 7vw, 3em); font-weight: 900;
    background: linear-gradient(90deg, #f7971e, #ffd200, #f7971e);
    -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    background-clip: text; margin-bottom: 14px;
  }
  .hero p { color: #8899aa; font-size: clamp(0.9em, 3vw, 1.15em); line-height: 1.7; max-width: 550px; margin: 0 auto; padding: 0 8px; }
  .cards {
    display: flex; flex-direction: column; align-items: center;
    gap: 20px; max-width: 500px; margin: 36px auto; padding: 0 20px;
  }
  .card {
    background: rgba(255,255,255,0.06); border: 1px solid rgba(255,255,255,0.1);
    border-radius: 16px; padding: 28px 24px; width: 100%; max-width: 460px;
    text-decoration: none; transition: all 0.3s ease; cursor: pointer;
    position: relative; overflow: hidden; display: block;
  }
  .card:hover, .card:active {
    border-color: rgba(247,151,30,0.5);
    box-shadow: 0 8px 30px rgba(247,151,30,0.12);
    background: rgba(255,255,255,0.09);
  }
  .card-era {
    display: inline-block; padding: 5px 14px; border-radius: 14px;
    font-size: 0.78em; font-weight: 700; margin-bottom: 12px;
  }
  .era-all { background: rgba(247,151,30,0.25); color: #f7971e; border: 1px solid rgba(247,151,30,0.4); }
  .card h2 { color: #f0f0f0; font-size: clamp(1.1em, 4vw, 1.3em); margin-bottom: 8px; font-weight: 700; padding-right: 32px; }
  .card p { color: #999; font-size: clamp(0.82em, 2.8vw, 0.92em); line-height: 1.6; }
  .card-meta {
    display: flex; flex-wrap: wrap; gap: 12px; margin-top: 16px; padding-top: 14px;
    border-top: 1px solid rgba(255,255,255,0.08);
  }
  .meta-item { font-size: 0.8em; color: #777; }
  .meta-item span { color: #ffd200; font-weight: 600; }
  .card-arrow {
    position: absolute; right: 20px; top: 50%;
    transform: translateY(-50%); font-size: 1.3em; color: rgba(255,255,255,0.15);
    transition: all 0.3s;
  }
  .card:hover .card-arrow, .card:active .card-arrow { color: #ffd200; }
  .footer { text-align: center; padding: 50px 20px 36px; color: #555; font-size: 0.82em; }

  @media (max-width: 480px) {
    .hero { padding: 56px 16px 28px; }
    .cards { padding: 0 16px; margin: 28px auto; }
    .card { padding: 22px 18px; border-radius: 14px; }
    .footer { padding: 36px 16px 28px; }
  }
</style>
</head>
<body>
<div class="hero">
  <h1>한국사 퀴즈</h1>
  <p>주관식으로 실력을 테스트해보세요.<br>힌트를 보고 답을 직접 입력하는 방식입니다.</p>
</div>
<div class="cards">
  <a class="card" href="full-quiz.html">
    <span class="card-era era-all">전 범위</span>
    <h2>한국사 전범위 퀴즈</h2>
    <p>선사시대부터 현대까지, 정리 노트를 바탕으로 한국사 전 시대의 핵심 내용을 확인하세요.</p>
    <div class="card-meta">
      <div class="meta-item">문제 수: <span>172문제</span></div>
      <div class="meta-item">유형: <span>인물 + 사건/제도</span></div>
    </div>
    <div class="card-arrow">→</div>
  </a>
</div>
<div class="footer"><p>한국사 시험 대비 퀴즈 블로그</p></div>
</body>
</html>
