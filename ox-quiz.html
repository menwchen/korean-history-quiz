<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>이정미 선생님의 한국사 OX퀴즈</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;600;800;900&display=swap" rel="stylesheet">
    <style>
        *{box-sizing:border-box;margin:0;padding:0}
        body{font-family:'Noto Sans KR','Apple SD Gothic Neo',sans-serif;background:linear-gradient(135deg,#e0c3fc 0%,#8ec5fc 50%,#fbc2eb 100%);background-attachment:fixed;color:#3a2d4f;min-height:100dvh;padding:env(safe-area-inset-top) env(safe-area-inset-right) env(safe-area-inset-bottom) env(safe-area-inset-left);overflow-x:hidden}
        body::before{content:'🏛️ 📜 ⚔️ 🏯 👑 🎓 🗺️ 🏔️ 🕊️ ⛵';position:fixed;top:0;left:0;width:100%;height:100%;font-size:26px;word-spacing:55px;line-height:110px;letter-spacing:45px;opacity:0.07;pointer-events:none;z-index:0;overflow:hidden;animation:floatBg 50s linear infinite}
        @keyframes floatBg{from{transform:translateY(0)}to{transform:translateY(-180px)}}
        .container{max-width:600px;margin:0 auto;padding:clamp(10px,3vw,24px);min-height:100dvh;display:flex;flex-direction:column;position:relative;z-index:1}
        .start-screen{flex:1;display:flex;flex-direction:column;justify-content:center;align-items:center;text-align:center;gap:14px;animation:fadeIn .6s}
        .start-screen .mascot{font-size:clamp(55px,14vw,80px);animation:bounce 2s infinite}
        .start-screen h1{font-size:clamp(1.5em,5.5vw,2.2em);font-weight:900;background:linear-gradient(135deg,#6a11cb,#2575fc);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;line-height:1.3}
        .teacher-name{font-size:clamp(0.85em,2.5vw,1em);color:#7c4dff;font-weight:600}
        .start-screen .sub{color:#6b5b7b;font-size:clamp(0.82em,2.3vw,.95em);line-height:1.5}
        .period-select{display:flex;flex-wrap:wrap;gap:8px;justify-content:center;max-width:420px}
        .period-chip{padding:8px 16px;border-radius:22px;border:2px solid rgba(124,77,255,.2);background:rgba(255,255,255,.6);color:#5e4b8a;font-size:clamp(.78em,2.2vw,.9em);font-weight:600;cursor:pointer;transition:all .2s;user-select:none;backdrop-filter:blur(4px)}
        .period-chip:hover{border-color:#7c4dff;color:#7c4dff;transform:translateY(-1px)}
        .period-chip.selected{background:linear-gradient(135deg,#6a11cb,#2575fc);border-color:transparent;color:#fff;box-shadow:0 3px 12px rgba(106,17,203,.3);transform:translateY(-1px)}
        .start-btn{margin-top:8px;padding:16px 48px;border-radius:30px;border:none;background:linear-gradient(135deg,#6a11cb,#2575fc);color:#fff;font-size:clamp(1em,3vw,1.2em);font-weight:800;cursor:pointer;box-shadow:0 6px 24px rgba(106,17,203,.35);letter-spacing:1px;transition:all .15s}
        .start-btn:active{transform:scale(.96)}
        .game-screen{display:none;flex:1;flex-direction:column;animation:fadeIn .4s}
        .game-screen.active{display:flex}
        .top-bar{display:flex;justify-content:space-between;align-items:center;padding:8px 0;margin-bottom:8px;font-size:clamp(.82em,2.3vw,.95em)}
        .top-bar .period-label{background:linear-gradient(135deg,rgba(124,77,255,.12),rgba(142,197,252,.2));color:#5e35b1;padding:5px 14px;border-radius:16px;font-size:clamp(.75em,2vw,.85em);font-weight:600;border:1px solid rgba(124,77,255,.2)}
        .top-bar .q-count{color:#7a6b8a;font-weight:600}
        .progress-wrap{width:100%;height:12px;background:rgba(255,255,255,.4);border-radius:6px;margin-bottom:14px;overflow:hidden;box-shadow:inset 0 1px 3px rgba(0,0,0,.08)}
        .progress-fill{height:100%;background:linear-gradient(to right,#6a11cb,#2575fc,#00c9ff);border-radius:6px;transition:width .4s;width:0%}
        .stats-row{display:flex;justify-content:center;gap:clamp(10px,3.5vw,24px);margin-bottom:16px}
        .stat{text-align:center;background:rgba(255,255,255,.5);border-radius:16px;padding:8px 16px;min-width:70px;backdrop-filter:blur(4px);border:1px solid rgba(255,255,255,.6)}
        .stat .num{font-size:clamp(1.2em,3.8vw,1.6em);font-weight:800}
        .stat .label{font-size:clamp(.65em,1.8vw,.75em);color:#8b7a9e;font-weight:600}
        .stat.correct .num{color:#2e7d32}
        .stat.wrong .num{color:#c62828}
        .stat.streak .num{color:#6a11cb}
        .q-card{flex:1;display:flex;flex-direction:column;justify-content:center;align-items:center;text-align:center;padding:clamp(24px,5vw,40px) clamp(18px,4vw,30px);background:rgba(255,255,255,.72);border:2px solid rgba(255,255,255,.8);border-radius:24px;margin-bottom:14px;min-height:220px;position:relative;transition:all .3s;backdrop-filter:blur(8px);box-shadow:0 8px 32px rgba(106,17,203,.08)}
        .q-card.pop-correct{border-color:#4caf50;background:rgba(232,245,233,.85);box-shadow:0 0 30px rgba(76,175,80,.2)}
        .q-card.pop-wrong{border-color:#ef5350;background:rgba(255,235,238,.85);box-shadow:0 0 30px rgba(239,83,80,.2)}
        .q-card .q-num-badge{position:absolute;top:14px;left:16px;font-size:clamp(.7em,2vw,.8em);color:#b39ddb;font-weight:800}
        .q-card .q-text{font-size:clamp(1.05em,3.2vw,1.3em);line-height:1.75;word-break:keep-all;color:#3a2d4f;max-width:480px;font-weight:500}
        .ox-buttons{display:flex;gap:clamp(16px,5vw,30px);justify-content:center;margin:10px auto;width:100%;max-width:400px}
        .ox-btn{flex:1;padding:clamp(18px,5vw,28px);border-radius:20px;border:3px solid transparent;font-size:clamp(2em,7vw,3.2em);font-weight:900;cursor:pointer;transition:all .15s;display:flex;flex-direction:column;align-items:center;gap:4px;backdrop-filter:blur(4px)}
        .ox-btn span{font-size:clamp(.6em,1.8vw,.7em);font-weight:600}
        .o-btn{background:rgba(76,175,80,.12);border-color:rgba(76,175,80,.3);color:#2e7d32}
        .o-btn:hover{background:rgba(76,175,80,.2);transform:scale(1.04)}
        .o-btn:active{transform:scale(.97)}
        .x-btn{background:rgba(239,83,80,.12);border-color:rgba(239,83,80,.3);color:#c62828}
        .x-btn:hover{background:rgba(239,83,80,.2);transform:scale(1.04)}
        .x-btn:active{transform:scale(.97)}
        .ox-btn:disabled{opacity:.4;cursor:default;transform:none!important}
        .feedback-overlay{display:none;text-align:center;margin-top:12px;animation:popUp .35s}
        .feedback-overlay.show{display:block}
        .feedback-emoji{font-size:clamp(40px,11vw,60px)}
        .feedback-msg{font-size:clamp(1em,3vw,1.2em);margin:6px 0;font-weight:800}
        .feedback-msg.correct-msg{color:#2e7d32}
        .feedback-msg.wrong-msg{color:#c62828}
        .feedback-answer{color:#6b5b7b;font-size:clamp(.85em,2.4vw,.95em);line-height:1.5;max-width:440px;margin:0 auto}
        .feedback-answer strong{color:#6a11cb}
        .next-btn{margin-top:14px;padding:13px 36px;border-radius:26px;border:none;background:linear-gradient(135deg,#6a11cb,#2575fc);color:#fff;font-size:clamp(.9em,2.5vw,1em);font-weight:700;cursor:pointer;box-shadow:0 4px 16px rgba(106,17,203,.3);transition:all .2s}
        .next-btn:hover{transform:translateY(-1px);box-shadow:0 6px 20px rgba(106,17,203,.4)}
        .result-screen{display:none;flex:1;flex-direction:column;justify-content:center;align-items:center;text-align:center;gap:14px;animation:fadeIn .5s}
        .result-screen.active{display:flex}
        .result-emoji{font-size:clamp(60px,15vw,90px);animation:bounce 1s}
        .result-title{font-size:clamp(1.4em,5vw,2em);font-weight:900;background:linear-gradient(135deg,#6a11cb,#2575fc);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
        .result-score{font-size:clamp(2.2em,8vw,3.5em);font-weight:900;color:#3a2d4f}
        .result-detail{color:#7a6b8a;font-size:clamp(.85em,2.5vw,1em);line-height:1.6}
        .result-grade{font-size:clamp(1.1em,3.2vw,1.3em);padding:10px 24px;border-radius:22px;font-weight:800}
        .result-actions{display:flex;flex-wrap:wrap;gap:10px;justify-content:center;margin-top:8px}
        .retry-btn{padding:14px 36px;border-radius:26px;border:none;background:linear-gradient(135deg,#6a11cb,#2575fc);color:#fff;font-size:1em;font-weight:800;cursor:pointer;box-shadow:0 4px 16px rgba(106,17,203,.3)}
        .home-btn{padding:14px 36px;border-radius:26px;border:2px solid rgba(124,77,255,.3);background:rgba(255,255,255,.5);color:#5e4b8a;font-size:1em;font-weight:600;cursor:pointer}
        .review-section{width:100%;max-width:500px;margin-top:20px;text-align:left}
        .review-toggle{display:block;width:100%;text-align:center;background:rgba(255,255,255,.5);border:1px solid rgba(124,77,255,.2);border-radius:16px;padding:12px;color:#5e4b8a;font-size:clamp(.85em,2.5vw,.95em);cursor:pointer;font-weight:600}
        .review-list{display:none;margin-top:10px}
        .review-list.open{display:block}
        .review-item{background:rgba(255,235,238,.6);border:1px solid rgba(198,40,40,.15);border-radius:14px;padding:12px;margin-bottom:8px;font-size:clamp(.82em,2.3vw,.92em)}
        .review-item .ri-q{color:#3a2d4f;margin-bottom:4px}
        .review-item .ri-a{color:#2e7d32;font-weight:600}
        .footer{text-align:center;padding:16px 8px;font-size:clamp(.7em,1.8vw,.78em);color:#9088a0;line-height:1.5}
        .confetti-wrap{position:fixed;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:999}
        .confetti{position:absolute;width:10px;height:10px;border-radius:2px;animation:confettiFall linear forwards}
        .sparkle{position:fixed;pointer-events:none;z-index:998;font-size:18px;animation:sparkleFloat 3s ease-in-out forwards;opacity:0}
        @keyframes sparkleFloat{0%{opacity:0;transform:translateY(0) scale(.5)}20%{opacity:1;transform:translateY(-20px) scale(1)}100%{opacity:0;transform:translateY(-80px) scale(.3)}}
        @keyframes fadeIn{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}
        @keyframes popUp{from{opacity:0;transform:scale(.8)}to{opacity:1;transform:scale(1)}}
        @keyframes shake{0%,100%{transform:translateX(0)}20%{transform:translateX(-8px)}40%{transform:translateX(8px)}60%{transform:translateX(-5px)}80%{transform:translateX(5px)}}
        @keyframes confettiFall{0%{transform:translateY(-10px) rotate(0);opacity:1}100%{transform:translateY(100vh) rotate(720deg);opacity:0}}
        @keyframes bounce{0%,100%{transform:scale(1)}50%{transform:scale(1.12)}}
        .shake{animation:shake .4s}.bounce{animation:bounce .4s}
        @media(max-width:400px){.container{padding:8px}.q-card{padding:18px 12px;min-height:180px}}
    </style>
</head>
<body>
<div class="container">
    <div class="start-screen" id="startScreen">
        <div class="mascot">&#x2B55;&#x274C;</div>
        <h1>한국사 OX퀴즈</h1>
        <div class="teacher-name">이정미 선생님의 한국사 교실</div>
        <p class="sub">맞으면 O, 틀리면 X!<br>빠르게 판단해 보세요!</p>
        <div class="period-select" id="periodSelect"></div>
        <div id="questionCount" style="color:#7c4dff;font-size:clamp(.85em,2.3vw,.95em);font-weight:600;"></div>
        <button class="start-btn" onclick="startGame()">시작하기!</button>
    </div>
    <div class="game-screen" id="gameScreen">
        <div class="top-bar">
            <span class="period-label" id="periodLabel"></span>
            <span class="q-count" id="qCount"></span>
        </div>
        <div class="progress-wrap"><div class="progress-fill" id="progressFill"></div></div>
        <div class="stats-row">
            <div class="stat correct"><div class="num" id="correctNum">0</div><div class="label">정답</div></div>
            <div class="stat streak"><div class="num" id="streakNum">0</div><div class="label">연속</div></div>
            <div class="stat wrong"><div class="num" id="wrongNum">0</div><div class="label">오답</div></div>
        </div>
        <div class="q-card" id="qCard">
            <div class="q-num-badge" id="qNumBadge"></div>
            <div class="q-text" id="qText"></div>
        </div>
        <div id="answerArea">
            <div class="ox-buttons">
                <button class="ox-btn o-btn" id="oBtn" onclick="submitOX(true)">O<span>맞아요</span></button>
                <button class="ox-btn x-btn" id="xBtn" onclick="submitOX(false)">X<span>틀려요</span></button>
            </div>
        </div>
        <div class="feedback-overlay" id="feedbackOverlay">
            <div class="feedback-emoji" id="fbEmoji"></div>
            <div class="feedback-msg" id="fbMsg"></div>
            <div class="feedback-answer" id="fbAnswer"></div>
            <button class="next-btn" id="nextBtn" onclick="nextQuestion()">다음 문제 &#x27A1;&#xFE0F;</button>
        </div>
    </div>
    <div class="result-screen" id="resultScreen">
        <div class="result-emoji" id="resultEmoji"></div>
        <div class="result-title" id="resultTitle"></div>
        <div class="result-score" id="resultScore"></div>
        <div class="result-detail" id="resultDetail"></div>
        <div class="result-grade" id="resultGrade"></div>
        <div class="result-actions">
            <button class="retry-btn" onclick="retryGame()">다시 도전!</button>
            <button class="home-btn" onclick="goHome()">시대 선택</button>
        </div>
        <div class="review-section" id="reviewSection">
            <button class="review-toggle" id="reviewToggle" onclick="toggleReview()">&#x1F4DD; 틀린 문제 보기</button>
            <div class="review-list" id="reviewList"></div>
        </div>
    </div>
    <div class="footer">&copy; 이정미 선생님의 한국사 교실<br><a href="mailto:rvocalise@kakao.com" style="color:#7c4dff;text-decoration:none;">rvocalise@kakao.com</a></div>
</div>
<div class="confetti-wrap" id="confettiWrap"></div>
<script>
const allQuizData = [
// 선사시대
{period:"선사시대",q:"구석기 시대 사람들은 동굴과 막집에서 생활했다.",a:true,exp:"구석기인은 동굴과 막집에서 생활하며 주먹도끼 등 뗀석기를 사용했습니다."},
{period:"선사시대",q:"빗살무늬토기는 청동기 시대에 만들어졌다.",a:false,exp:"빗살무늬토기는 신석기 시대의 대표적인 토기입니다."},
{period:"선사시대",q:"고인돌은 청동기 시대의 대표적인 무덤이다.",a:true,exp:"고인돌은 청동기 시대에 만들어진 돌무덤입니다."},
{period:"선사시대",q:"벼농사는 신석기 시대에 시작되었다.",a:false,exp:"벼농사는 청동기 시대에 시작되었습니다."},
{period:"선사시대",q:"고조선의 법은 범금8조로 알려져 있다.",a:true,exp:"고조선은 범금8조라는 법으로 사회를 다스렸습니다."},
{period:"선사시대",q:"부여에서는 '무천'이라는 제천행사를 열었다.",a:false,exp:"부여의 제천행사는 '영고'입니다. 무천은 동예의 행사입니다."},
{period:"선사시대",q:"옥저에는 민며느리제와 가족공동묘 풍습이 있었다.",a:true,exp:"옥저는 민며느리제(어린 여자를 미리 데려다 키우는 제도)와 가족공동묘가 특징입니다."},
{period:"선사시대",q:"삼한에는 소도라는 신성한 구역이 있었다.",a:true,exp:"삼한의 소도는 천군이 다스리는 신성 구역입니다."},
{period:"선사시대",q:"동예의 특산물은 단궁, 과하마, 반어피이다.",a:true,exp:"동예는 단궁(짧은 활), 과하마(작은 말), 반어피(바다표범 가죽)가 유명했습니다."},
{period:"선사시대",q:"서옥제(데릴사위제)는 백제의 혼인 풍습이다.",a:false,exp:"서옥제는 고구려의 혼인 풍습입니다."},
{period:"선사시대",q:"가락바퀴는 신석기 시대에 실을 잣는 데 사용한 도구이다.",a:true,exp:"가락바퀴는 신석기 시대 사람들이 실을 만드는 데 사용했습니다."},
// 삼국시대
{period:"삼국시대",q:"고구려 소수림왕은 불교를 수용하고 태학을 세웠다.",a:true,exp:"소수림왕은 불교 수용, 율령 반포, 태학 설립으로 체제를 정비했습니다."},
{period:"삼국시대",q:"광개토대왕은 '건흥'이라는 연호를 사용했다.",a:false,exp:"광개토대왕의 연호는 '영락'입니다."},
{period:"삼국시대",q:"장수왕은 평양으로 수도를 옮겼다.",a:true,exp:"장수왕은 평양으로 천도하고 광개토대왕릉비를 건립했습니다."},
{period:"삼국시대",q:"살수대첩에서 수나라 군대를 물리친 장군은 연개소문이다.",a:false,exp:"살수대첩의 영웅은 을지문덕 장군입니다."},
{period:"삼국시대",q:"백제 근초고왕은 고구려 고국원왕을 전사시켰다.",a:true,exp:"근초고왕은 마한을 복속하고 고구려 고국원왕을 전사시킨 백제 전성기의 왕입니다."},
{period:"삼국시대",q:"백제 성왕은 웅진으로 천도했다.",a:false,exp:"성왕은 사비로 천도하고 국호를 남부여라 했습니다."},
{period:"삼국시대",q:"신라 법흥왕은 이차돈의 순교를 계기로 불교를 공인했다.",a:true,exp:"법흥왕 때 이차돈이 순교하면서 불교가 공인되었습니다."},
{period:"삼국시대",q:"신라 진흥왕은 화랑도를 개편하고 대가야를 정복했다.",a:true,exp:"진흥왕은 화랑도 개편, 북한산 순수비 건립, 대가야 정복 등의 업적을 남겼습니다."},
{period:"삼국시대",q:"신문왕은 녹읍을 부활시켰다.",a:false,exp:"신문왕은 녹읍을 폐지하고 국학을 설립했습니다."},
{period:"삼국시대",q:"설총은 이두를 정리한 인물이다.",a:true,exp:"설총은 원효대사의 아들로 이두를 정리하고 화왕계를 지었습니다."},
{period:"삼국시대",q:"최치원은 당에서 빈공과에 합격하고 토황소격문을 썼다.",a:true,exp:"최치원은 6두품 출신으로 당의 빈공과에 합격했습니다."},

{period:"일제시대",q:"물산장려운동은 서울에서 이승만이 주도했다.",a:false,exp:"물산장려운동은 평양에서 조만식이 중심이 되어 전개되었습니다."},
{period:"일제시대",q:"신채호는 조선혁명선언문과 조선상고사를 저술했다.",a:true,exp:"신채호는 '아와 비아의 투쟁'을 주장한 역사학자이자 독립운동가입니다."},
{period:"일제시대",q:"박은식은 한국통사를 쓰고 임시정부 2대 대통령을 역임했다.",a:true,exp:"박은식은 국혼을 강조하고 한국통사를 저술했습니다."},
{period:"일제시대",q:"조선어학회는 한글 맞춤법 통일안을 만들었다.",a:true,exp:"조선어학회는 한글 맞춤법 통일안과 조선말 큰사전 편찬을 추진했습니다."},
{period:"일제시대",q:"시 '별 헤는 밤'을 쓴 시인은 이육사이다.",a:false,exp:"'별 헤는 밤', '서시'는 윤동주의 시입니다. 이육사는 '광야'를 썼습니다."},
{period:"일제시대",q:"손병희는 동학을 천도교로 바꾸고 민족대표 33인에 참여했다.",a:true,exp:"손병희는 동학의 3대 교주로 3.1운동에 민족대표로 참여했습니다."},
{period:"일제시대",q:"산미증식계획은 1930년대에 실시되었다.",a:false,exp:"산미증식계획은 1920년대에 실시된 일제의 쌀 수탈 정책입니다."},
// 현대
{period:"현대",q:"이승만은 '정읍발언'으로 남한 단독 정부 수립을 주장했다.",a:true,exp:"이승만은 정읍에서 남한만이라도 단독 정부를 세우자고 주장했습니다."},
{period:"현대",q:"제주 4.3사건은 남한 단독 정부 수립에 반대하여 일어났다.",a:true,exp:"제주 4.3사건은 남한 단독 정부에 반대하는 사람들이 무차별 희생된 사건입니다."},
{period:"현대",q:"4.19혁명은 전두환 정부 시기에 일어났다.",a:false,exp:"4.19혁명은 이승만 정부의 3.15 부정선거에 항거한 1960년의 사건입니다."},
{period:"현대",q:"5.18 민주화 운동은 광주에서 일어났다.",a:true,exp:"1980년 전두환 정부 시기 광주에서 민주화를 요구하는 시민들이 일어났습니다."},
{period:"현대",q:"6월 민주항쟁의 결과 5년 단임 직선제가 이루어졌다.",a:true,exp:"1987년 호헌철폐, 독재타도를 외치며 직선제 개헌을 이끌어냈습니다."},
{period:"현대",q:"경부고속도로는 김대중 대통령 때 건설되었다.",a:false,exp:"경부고속도로는 박정희 대통령 때 건설되었습니다."},
{period:"현대",q:"서울 올림픽을 개최한 대통령은 노태우이다.",a:true,exp:"1988년 서울 올림픽은 노태우 대통령 재임 시기에 개최되었습니다."},
{period:"현대",q:"금융실명제를 실시한 대통령은 김영삼이다.",a:true,exp:"김영삼 대통령은 금융실명제 실시, 조선총독부 건물 철거 등을 단행했습니다."},
{period:"현대",q:"최초의 남북 정상 회담은 노무현 대통령이 실현했다.",a:false,exp:"최초의 남북 정상 회담은 김대중 대통령이 실현하고 6.15 남북 공동 선언을 발표했습니다."},
{period:"현대",q:"6.25전쟁에는 16개국 유엔군이 참전했다.",a:true,exp:"한국전쟁에 유엔 결의에 따라 16개국이 참전하였습니다."},
];

const periodEmoji={"선사시대":"🏔️","삼국시대":"⚔️","고려":"🏯","조선":"📜","개항기":"⛵","일제시대":"🕊️","현대":"🇰🇷"};
const periods=[...new Set(allQuizData.map(q=>q.period))];
const correctMsgs=[["🎉","대단해요!"],["🌟","정답! 역사 천재!"],["🏆","완벽해요!"],["👏","맞았어요!"],["✨","훌륭해요!"],["😎","멋져요!"],["🔥","불꽃 정답!"],["💪","실력이 대단해!"]];
const wrongMsgs=[["🤔","아쉬워요!"],["📚","다음엔 맞출 수 있어요!"],["🙌","괜찮아요! 배웠어요!"],["😊","힘내요!"]];
const streakMsgs={3:"3연속 정답! 🔥",5:"5연속! 대단해요! 🌟",10:"10연속!! 역사 박사! 🏆",15:"15연속!!! 전설! 👑"};

let quizData=[],currentIdx=0,correctCount=0,wrongCount=0,streak=0,maxStreak=0,wrongList=[],selectedPeriod="전체";

function shuffle(a){for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]]}return a}
function spawnConfetti(n){const w=document.getElementById('confettiWrap'),c=['#7c4dff','#2575fc','#4caf50','#ffd200','#ff5252','#e040fb','#00e5ff'];for(let i=0;i<n;i++){const e=document.createElement('div');e.className='confetti';e.style.left=Math.random()*100+'%';e.style.top='-10px';e.style.background=c[Math.floor(Math.random()*c.length)];e.style.width=(6+Math.random()*8)+'px';e.style.height=(6+Math.random()*8)+'px';e.style.animationDuration=(1.5+Math.random()*2)+'s';e.style.animationDelay=(Math.random()*.5)+'s';w.appendChild(e);setTimeout(()=>e.remove(),4000)}}
function spawnSparkle(x,y){const s=document.createElement('div');s.className='sparkle';s.textContent=['✨','⭐','🌟','💫'][Math.floor(Math.random()*4)];s.style.left=x+'px';s.style.top=y+'px';document.body.appendChild(s);setTimeout(()=>s.remove(),3000)}

function initStart(){
    const sel=document.getElementById('periodSelect');sel.innerHTML='';
    const ac=document.createElement('div');ac.className='period-chip selected';ac.textContent='전체 ('+allQuizData.length+')';ac.onclick=()=>selectPeriod('전체',ac);sel.appendChild(ac);
    periods.forEach(p=>{const c=allQuizData.filter(q=>q.period===p).length;const ch=document.createElement('div');ch.className='period-chip';ch.textContent=(periodEmoji[p]||'')+' '+p+' ('+c+')';ch.onclick=()=>selectPeriod(p,ch);sel.appendChild(ch)});
    updateCount();
}
function selectPeriod(p,ch){selectedPeriod=p;document.querySelectorAll('.period-chip').forEach(c=>c.classList.remove('selected'));ch.classList.add('selected');updateCount()}
function updateCount(){const c=selectedPeriod==='전체'?allQuizData.length:allQuizData.filter(q=>q.period===selectedPeriod).length;document.getElementById('questionCount').textContent=c+'문제 도전!'}

function startGame(){
    quizData=selectedPeriod==='전체'?[...allQuizData]:allQuizData.filter(q=>q.period===selectedPeriod);
    shuffle(quizData);currentIdx=0;correctCount=0;wrongCount=0;streak=0;maxStreak=0;wrongList=[];
    document.getElementById('startScreen').style.display='none';
    document.getElementById('resultScreen').classList.remove('active');
    document.getElementById('gameScreen').classList.add('active');
    showQuestion();
}
function showQuestion(){
    const q=quizData[currentIdx];
    document.getElementById('periodLabel').textContent=(periodEmoji[q.period]||'')+' '+q.period;
    document.getElementById('qCount').textContent=(currentIdx+1)+' / '+quizData.length;
    document.getElementById('qNumBadge').textContent='Q'+(currentIdx+1);
    document.getElementById('qText').textContent=q.q;
    document.getElementById('progressFill').style.width=(currentIdx/quizData.length*100)+'%';
    document.getElementById('correctNum').textContent=correctCount;
    document.getElementById('wrongNum').textContent=wrongCount;
    document.getElementById('streakNum').textContent=streak;
    document.getElementById('oBtn').disabled=false;
    document.getElementById('xBtn').disabled=false;
    document.getElementById('feedbackOverlay').classList.remove('show');
    document.getElementById('answerArea').style.display='block';
    const card=document.getElementById('qCard');card.className='q-card';card.style.animation='none';card.offsetHeight;card.style.animation='fadeIn .35s';
}
function submitOX(userAnswer){
    const q=quizData[currentIdx];const isCorrect=(userAnswer===q.a);
    document.getElementById('oBtn').disabled=true;document.getElementById('xBtn').disabled=true;
    document.getElementById('answerArea').style.display='none';
    const card=document.getElementById('qCard'),fb=document.getElementById('feedbackOverlay');
    const fbEmoji=document.getElementById('fbEmoji'),fbMsg=document.getElementById('fbMsg'),fbAnswer=document.getElementById('fbAnswer');
    if(isCorrect){
        correctCount++;streak++;if(streak>maxStreak)maxStreak=streak;
        card.classList.add('pop-correct');
        const msg=correctMsgs[Math.floor(Math.random()*correctMsgs.length)];
        fbEmoji.textContent=msg[0];fbMsg.textContent=msg[1];fbMsg.className='feedback-msg correct-msg';
        let extra='';if(streakMsgs[streak])extra='<br>'+streakMsgs[streak];
        fbAnswer.innerHTML=q.exp+(extra?'<br>'+extra:'');
        for(let i=0;i<3;i++)spawnSparkle(Math.random()*window.innerWidth,Math.random()*window.innerHeight*.6);
        if(streak>=5)spawnConfetti(8);else if(streak>=3)spawnConfetti(4);
        document.getElementById('streakNum').parentElement.classList.add('bounce');
        setTimeout(()=>document.getElementById('streakNum').parentElement.classList.remove('bounce'),400);
    }else{
        wrongCount++;streak=0;card.classList.add('pop-wrong');card.classList.add('shake');
        const msg=wrongMsgs[Math.floor(Math.random()*wrongMsgs.length)];
        fbEmoji.textContent=msg[0];fbMsg.textContent=msg[1];fbMsg.className='feedback-msg wrong-msg';
        fbAnswer.innerHTML='정답은 <strong>'+(q.a?'O':'X')+'</strong>! '+q.exp;
        wrongList.push({q:q.q,correctA:q.a?'O':'X',period:q.period,exp:q.exp});
    }
    document.getElementById('correctNum').textContent=correctCount;
    document.getElementById('wrongNum').textContent=wrongCount;
    document.getElementById('streakNum').textContent=streak;
    fb.classList.add('show');
    document.getElementById('nextBtn').textContent=currentIdx>=quizData.length-1?'결과 보기 🏆':'다음 문제 ➡️';
}
function nextQuestion(){currentIdx++;if(currentIdx>=quizData.length){showResults();return}showQuestion()}
function showResults(){
    document.getElementById('gameScreen').classList.remove('active');
    const rs=document.getElementById('resultScreen');rs.classList.add('active');
    const pct=Math.round(correctCount/quizData.length*100);
    document.getElementById('resultScore').textContent=correctCount+' / '+quizData.length;
    let emoji,title,grade,gc;
    if(pct>=90){emoji='👑';title='역사 마스터!';grade='S등급';gc='#7c4dff';spawnConfetti(20)}
    else if(pct>=70){emoji='🌟';title='역사 박사!';grade='A등급';gc='#4caf50';spawnConfetti(10)}
    else if(pct>=50){emoji='💪';title='잘 했어요!';grade='B등급';gc='#2196f3'}
    else if(pct>=30){emoji='📚';title='조금만 더!';grade='C등급';gc='#ff9800'}
    else{emoji='😊';title='다시 도전해요!';grade='D등급';gc='#ff5252'}
    document.getElementById('resultEmoji').textContent=emoji;
    document.getElementById('resultTitle').textContent=title;
    document.getElementById('resultDetail').textContent=pct+'% 정답률 | 최대 연속 '+maxStreak+'개';
    const ge=document.getElementById('resultGrade');ge.textContent=grade;ge.style.background=gc+'22';ge.style.color=gc;ge.style.border='2px solid '+gc;
    const rv=document.getElementById('reviewSection'),rl=document.getElementById('reviewList');
    if(wrongList.length>0){rv.style.display='block';document.getElementById('reviewToggle').textContent='📝 틀린 문제 보기 ('+wrongList.length+'개)';rl.innerHTML='';
        wrongList.forEach(w=>{rl.innerHTML+='<div class="review-item"><div class="ri-q">['+w.period+'] '+w.q+'</div><div class="ri-a">정답: '+w.correctA+' — '+w.exp+'</div></div>'});
    }else{rv.style.display='none'}
}
function toggleReview(){document.getElementById('reviewList').classList.toggle('open')}
function retryGame(){document.getElementById('resultScreen').classList.remove('active');startGame()}
function goHome(){document.getElementById('resultScreen').classList.remove('active');document.getElementById('gameScreen').classList.remove('active');document.getElementById('startScreen').style.display='flex'}
initStart();
</script>
</body>
</html>
