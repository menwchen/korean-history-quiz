<!DOCTYPE html>

<title>한국사 전범위 퀴즈 - 주관식</title>
<style>

<body>

<div class="header">
  <h1>한국사 전범위 퀴즈</h1>

</div>

</div>

<div class="quiz-container" id="qArea"></div>

<div class="nav-buttons" id="navArea">

  <button class="nav-btn primary" id="nextBtn" onclick="next()" style="display:none">다음 문제</button>
</div>

<div class="result-screen" id="resultScreen">
  <h2>퀴즈 완료!</h2>
  <div class="result-score" id="fScore"></div>
  <div class="result-msg" id="rMsg"></div>
  <div class="review-section" id="reviewSec"></div>
  <br>
  <button class="nav-btn primary" onclick="restart()">다시 풀기</button>
</div>

<script>

let cur=0, cc=0, ww=0;
let ans=Array(Q.length).fill(false);
let uA=Array(Q.length).fill('');
let isC=Array(Q.length).fill(false);

function norm(s){return s.replace(/\s+/g,'').replace(/[·\-()（）]/g,'').toLowerCase();}

function render(i){
  const q=Q[i], a=document.getElementById('qArea');
  const eraMap={pre:'선사/고조선',three:'삼국시대',goryeo:'고려',joseon:'조선',modern:'개항기',contemp:'현대'};
  const eraCls={pre:'era-pre',three:'era-three',goryeo:'era-goryeo',joseon:'era-joseon',modern:'era-modern',contemp:'era-contemp'};
  const typeCls=q.type===1?'type1':'type2';
  const typeName=q.type===1?'유형1 | 왕/인물 이름':'유형2 | 업적/사건';
  
  let res='';
  if(ans[i]){
    res=isC[i]
      ?'<div class="result-badge cr show">정답입니다!</div>'
      :'<div class="result-badge wr show">오답입니다. 정답: <strong>'+q.answer+'</strong></div>';
  }
  
  a.innerHTML=
    '<div class="question-card">'+
    '<span class="era-badge '+eraCls[q.era]+'">'+q.eraName+'</span>'+
    '<span class="type-badge '+typeCls+'">'+typeName+'</span>'+
    '<div class="question-num">문제 '+(i+1)+' / '+Q.length+'</div>'+
    '<div class="question-text">'+q.q+'</div>'+
    '<div class="hint-box">'+q.hint+'</div>'+
    '<div class="answer-row">'+
    '<input type="text" class="answer-input" id="aIn" placeholder="답을 입력하세요" value="'+(uA[i]||'')+'" '+(ans[i]?'disabled':'')+' autocomplete="off">'+
    '<button class="submit-btn" id="sBtn" onclick="check('+i+')" '+(ans[i]?'disabled':'')+'>확인</button>'+
    '</div>'+
    res+
    '<div class="explanation '+(ans[i]?'show':'')+'">'+q.exp+'</div>'+
    '</div>';
  
  document.getElementById('qNum').textContent=(i+1)+'/'+Q.length;
  document.getElementById('pFill').style.width=(((i+1)/Q.length)*100)+'%';
  document.getElementById('prevBtn').classList.toggle('hidden',i===0);
  var nb=document.getElementById('nextBtn');
  nb.style.display=ans[i]?'':'none';
  nb.textContent=i===Q.length-1?'결과 보기':'다음 문제';
  
  if(!ans[i]) setTimeout(function(){var inp=document.getElementById('aIn');if(inp)inp.focus();},80);
  setTimeout(function(){var inp=document.getElementById('aIn');if(inp)inp.onkeydown=function(e){if(e.key==='Enter'&&!ans[i])check(i);};},50);
}

function check(i){
  if(ans[i])return;
  var inp=document.getElementById('aIn'), v=inp.value.trim();
  if(!v){inp.focus();return;}
  ans[i]=true; uA[i]=v;
  var nv=norm(v), match=Q[i].accepts.some(function(a){return norm(a)===nv;});
  if(match){cc++;isC[i]=true;}else{ww++;isC[i]=false;}
  document.getElementById('cCnt').textContent=cc;
  document.getElementById('wCnt').textContent=ww;
  render(i);
}

function next(){if(cur===Q.length-1){showResult();return;}cur++;render(cur);}
function prev(){if(cur>0){cur--;render(cur);}}

function showResult(){
  document.getElementById('qArea').classList.add('hidden');
  document.getElementById('navArea').classList.add('hidden');
  var rs=document.getElementById('resultScreen');
  rs.style.display='block';
  document.getElementById('fScore').textContent=cc+' / '+Q.length;
  var p=(cc/Q.length)*100, m='';
  if(p===100)m='만점! 한국사 마스터입니다!';
  else if(p>=85)m='훌륭합니다! 거의 완벽해요. 틀린 부분만 복습하면 됩니다.';
  else if(p>=70)m='좋아요! 대부분 잘 알고 있어요. 아래 오답 노트를 확인해보세요.';
  else if(p>=50)m='절반 이상 맞았어요. 시대별로 정리하며 복습해보세요.';
  else m='아직 공부가 더 필요해요. 정리 노트를 다시 꼼꼼히 읽어보세요!';
  document.getElementById('rMsg').textContent=m;
  
  var rv=document.getElementById('reviewSec'),h='<h3>오답 노트</h3>',hw=false;
  for(var i=0;i<Q.length;i++){
    if(!isC[i]){
      hw=true;
      h+='<div class="review-item rw">'+
        '<div class="rq">Q'+(i+1)+'. '+Q[i].q.replace(/<[^>]*>/g,'').substring(0,80)+'...</div>'+
        '<div class="ra">내 답: <span class="user-ans">'+(uA[i]||'(미입력)')+'</span> → 정답: <span>'+Q[i].answer+'</span></div>'+
        '<div class="ra" style="margin-top:5px;font-size:0.83em;">'+Q[i].exp+'</div></div>';
    }
  }
  if(!hw)h+='<p style="color:#2ecc71;font-size:1.1em;">모든 문제를 맞았습니다! 대단해요!</p>';
  rv.innerHTML=h;
}

function restart(){
  cur=0;cc=0;ww=0;
  ans=Array(Q.length).fill(false);uA=Array(Q.length).fill('');isC=Array(Q.length).fill(false);
  document.getElementById('cCnt').textContent='0';
  document.getElementById('wCnt').textContent='0';
  document.getElementById('qArea').classList.remove('hidden');
  document.getElementById('navArea').classList.remove('hidden');
  document.getElementById('resultScreen').style.display='none';
  render(0);
}

render(0);
</script>
