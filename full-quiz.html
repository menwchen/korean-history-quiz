<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>한국사 주관식 퀴즈 (100문항+)</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: 'Apple SD Gothic Neo', 'Malgun Gothic', sans-serif;
            background: linear-gradient(135deg, #0f0c29, #302b63, #24243e);
            color: #e0e0e0;
            min-height: 100dvh;
            padding: env(safe-area-inset-top) env(safe-area-inset-right) env(safe-area-inset-bottom) env(safe-area-inset-left);
        }
        .container {
            max-width: 800px;
            margin: 0 auto;
            padding: clamp(12px, 3vw, 30px);
        }
        header {
            text-align: center;
            padding: clamp(15px, 4vw, 30px) 0;
        }
        header h1 {
            font-size: clamp(1.4em, 5vw, 2em);
            background: linear-gradient(to right, #f7971e, #ffd200);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        .score-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 8px;
            background: rgba(255,255,255,0.07);
            border-radius: 12px;
            padding: clamp(10px, 2vw, 16px);
            margin-bottom: 16px;
            font-size: clamp(0.85em, 2.5vw, 1em);
        }
        .progress-text { color: #aaa; }
        .score-text { color: #ffd200; font-weight: bold; }
        .period-nav {
            display: flex;
            flex-wrap: wrap;
            gap: 6px;
            margin-bottom: 20px;
            justify-content: center;
        }
        .period-btn {
            background: rgba(255,255,255,0.08);
            color: #ccc;
            border: 1px solid rgba(255,255,255,0.15);
            padding: 6px 12px;
            border-radius: 20px;
            font-size: clamp(0.75em, 2.2vw, 0.85em);
            cursor: pointer;
            transition: all 0.2s;
        }
        .period-btn:hover, .period-btn.active {
            background: rgba(255,215,0,0.15);
            color: #ffd200;
            border-color: #ffd200;
        }
        .question-card {
            background: rgba(255,255,255,0.06);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 14px;
            padding: clamp(14px, 3vw, 22px);
            margin-bottom: 12px;
            transition: all 0.3s;
        }
        .question-card.correct {
            border-color: #4caf50;
            background: rgba(76,175,80,0.08);
        }
        .question-card.wrong {
            border-color: #ff5252;
            background: rgba(255,82,82,0.08);
        }
        .question-card.hidden { display: none; }
        .q-header {
            display: flex;
            align-items: baseline;
            gap: 8px;
            margin-bottom: 10px;
        }
        .q-number {
            font-size: clamp(0.75em, 2vw, 0.85em);
            color: #888;
            white-space: nowrap;
        }
        .q-period {
            font-size: clamp(0.65em, 1.8vw, 0.75em);
            background: rgba(255,215,0,0.12);
            color: #ffd200;
            padding: 2px 8px;
            border-radius: 10px;
            white-space: nowrap;
        }
        .q-text {
            font-size: clamp(0.95em, 2.8vw, 1.1em);
            line-height: 1.6;
            margin-bottom: 12px;
            color: #eee;
            word-break: keep-all;
        }
        .answer-row {
            display: flex;
            gap: 8px;
            align-items: center;
        }
        .answer-input {
            flex: 1;
            min-width: 0;
            padding: 10px 14px;
            border-radius: 10px;
            border: 1px solid rgba(255,255,255,0.2);
            background: rgba(255,255,255,0.08);
            color: #fff;
            font-size: 16px;
            -webkit-appearance: none;
            outline: none;
            transition: border-color 0.2s;
        }
        .answer-input:focus {
            border-color: #ffd200;
        }
        .answer-input:disabled {
            opacity: 0.6;
        }
        .submit-btn {
            flex-shrink: 0;
            padding: 10px 18px;
            border-radius: 10px;
            border: none;
            background: linear-gradient(135deg, #f7971e, #ffd200);
            color: #1a1a2e;
            font-weight: bold;
            font-size: clamp(0.85em, 2.5vw, 0.95em);
            cursor: pointer;
            transition: opacity 0.2s;
        }
        .submit-btn:disabled {
            opacity: 0.4;
            cursor: default;
        }
        .feedback {
            margin-top: 8px;
            font-size: clamp(0.82em, 2.3vw, 0.92em);
            display: none;
        }
        .feedback.show { display: block; }
        .feedback.correct-fb { color: #4caf50; }
        .feedback.wrong-fb { color: #ff5252; }
        .hint-btn {
            background: none;
            border: none;
            color: #888;
            font-size: clamp(0.75em, 2vw, 0.82em);
            cursor: pointer;
            margin-top: 6px;
            text-decoration: underline;
        }
        .hint-btn:hover { color: #ffd200; }
        .hint-text {
            font-size: clamp(0.78em, 2.1vw, 0.85em);
            color: #aaa;
            margin-top: 4px;
            display: none;
        }
        .hint-text.show { display: block; }
        .bottom-bar {
            text-align: center;
            padding: 20px;
            margin-top: 20px;
        }
        .reset-btn {
            padding: 14px 36px;
            border-radius: 12px;
            border: 2px solid #ffd200;
            background: transparent;
            color: #ffd200;
            font-size: 1em;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.2s;
        }
        .reset-btn:hover {
            background: rgba(255,215,0,0.1);
        }
        .result-summary {
            display: none;
            text-align: center;
            padding: 30px;
            margin: 20px 0;
            background: rgba(255,255,255,0.06);
            border-radius: 14px;
            border: 1px solid rgba(255,215,0,0.3);
        }
        .result-summary h2 {
            font-size: clamp(1.3em, 4vw, 1.8em);
            color: #ffd200;
            margin-bottom: 10px;
        }
        .result-summary .big-score {
            font-size: clamp(2em, 7vw, 3em);
            font-weight: bold;
            color: #fff;
        }
        .result-summary .grade {
            font-size: clamp(1em, 3vw, 1.3em);
            margin-top: 8px;
        }
        @media (max-width: 480px) {
            .container { padding: 10px; }
            .question-card { padding: 12px; }
            .answer-row { gap: 6px; }
            .submit-btn { padding: 10px 14px; }
        }
        @media (max-height: 500px) and (max-width: 700px) {
            header { padding: 8px 0; }
            .score-bar { padding: 8px; margin-bottom: 8px; }
            .question-card { padding: 10px; margin-bottom: 8px; }
        }
    </style>
</head>
<body>
<div class="container">
    <header>
        <h1>한국사 주관식 퀴즈</h1>
        <p style="color:#aaa; margin-top:6px; font-size:clamp(0.8em,2.3vw,0.95em);">선사시대부터 현대까지 — 하나의 사실, 하나의 답</p>
    </header>

    <div class="score-bar">
        <span class="progress-text">진행: <span id="answered">0</span> / <span id="total">0</span></span>
        <span class="score-text">정답: <span id="score">0</span>점</span>
    </div>

    <div class="period-nav" id="periodNav"></div>

    <div id="quizContainer"></div>

    <div class="result-summary" id="resultSummary">
        <h2>퀴즈 완료!</h2>
        <div class="big-score"><span id="finalScore">0</span> / <span id="finalTotal">0</span></div>
        <div class="grade" id="grade"></div>
    </div>

    <div class="bottom-bar">
        <button class="reset-btn" onclick="resetQuiz()">다시 풀기</button>
    </div>
</div>

<script>
const quizData = [
    // ===== 선사시대 =====
    { period: "선사시대", q: "동굴과 막집에서 생활하며 주먹도끼, 찍개, 뗀석기를 사용한 시대는?", a: ["구석기", "구석기시대"], hint: "돌을 깨뜨려 만든 석기" },
    { period: "선사시대", q: "빗살무늬토기를 만들고, 가락바퀴를 사용한 시대는?", a: ["신석기", "신석기시대"], hint: "토기와 실잣기" },
    { period: "선사시대", q: "거푸집, 반달돌칼, 청동검, 청동거울, 고인돌이 등장한 시대는?", a: ["청동기", "청동기시대"], hint: "금속 도구의 시작" },
    { period: "선사시대", q: "벼농사가 시작된 시대는?", a: ["청동기", "청동기시대"], hint: "고인돌도 이 시대" },
    { period: "선사시대", q: "민무늬토기가 사용된 시대는?", a: ["청동기", "청동기시대"], hint: "빗살무늬토기 이후" },
    { period: "선사시대", q: "범금8조로 유명한 우리나라 최초의 국가는?", a: ["고조선"], hint: "단군왕검" },
    { period: "선사시대", q: "'영고'라는 제천행사를 열고, 사출도(마가·우가·구가·저가)를 둔 나라는?", a: ["부여"], hint: "만주 지역 국가" },
    { period: "선사시대", q: "서옥제(데릴사위제)로 유명한 나라는?", a: ["고구려"], hint: "삼국 중 가장 넓은 영토" },
    { period: "선사시대", q: "민며느리제와 가족공동묘가 특징인 나라는?", a: ["옥저"], hint: "동해안 지역" },
    { period: "선사시대", q: "책화, 무천의 풍습이 있고 단궁·과하마·반어피가 특산물인 나라는?", a: ["동예"], hint: "족외혼도 이 나라" },
    { period: "선사시대", q: "소도(신성구역)가 있고, 지배자를 신지·읍차라 부른 사회는?", a: ["삼한"], hint: "마한, 진한, 변한" },

    // ===== 고구려 =====
    { period: "삼국시대", q: "불교를 수용하고, 율령을 반포하며, 태학을 세운 고구려 왕은?", a: ["소수림왕"], hint: "고구려 체제 정비" },
    { period: "삼국시대", q: "'영락'이라는 연호를 사용하고, 신라에 침입한 왜를 격퇴한 고구려 왕은?", a: ["광개토대왕", "광개토왕", "광개토태왕"], hint: "거란·숙신·후연 정벌" },
    { period: "삼국시대", q: "평양으로 천도하고 광개토대왕릉비를 건립한 고구려 왕은?", a: ["장수왕"], hint: "백제 개로왕을 죽임" },
    { period: "삼국시대", q: "백제를 공격하여 한성을 함락시키고 백제 개로왕을 죽인 고구려 왕은?", a: ["장수왕"], hint: "평양 천도" },
    { period: "삼국시대", q: "천리장성을 축조하고, 대막리지가 된 고구려의 실권자는?", a: ["연개소문"], hint: "김춘추가 군사 요청" },
    { period: "삼국시대", q: "살수대첩에서 수나라 군대를 물리친 고구려 장군은?", a: ["을지문덕"], hint: "살수(청천강)" },
    { period: "삼국시대", q: "고구려의 빈민 구제 제도로, 곡식을 빌려주었다가 가을에 갚게 한 것은?", a: ["진대법"], hint: "고구려의 복지 제도" },
    { period: "삼국시대", q: "고구려의 귀족 회의 제도 이름은?", a: ["제가회의"], hint: "국가 중대사 결정" },

    // ===== 백제 =====
    { period: "삼국시대", q: "마한을 복속하고 고구려 고국원왕을 전사시킨 백제 왕은?", a: ["근초고왕"], hint: "백제 전성기" },
    { period: "삼국시대", q: "무령왕릉의 주인이며, 중국 남조의 양과 친선관계를 맺은 백제 왕은?", a: ["무령왕"], hint: "무령왕릉" },
    { period: "삼국시대", q: "남부여라 칭하고, 사비로 천도하며, 신라 진흥왕과 연합한 백제 왕은?", a: ["성왕"], hint: "한강 하류 일시 회복" },
    { period: "삼국시대", q: "백제의 지방 통치 제도로 왕족을 파견하여 다스린 22개 지역은?", a: ["22담로", "담로"], hint: "왕족 파견 지방통치" },
    { period: "삼국시대", q: "백제의 귀족 회의 장소로, 바위 위에서 회의를 한 곳은?", a: ["정사암"], hint: "바위 이름" },

    // ===== 신라 =====
    { period: "삼국시대", q: "우경(소로 밭 가는 것)을 장려하고, 순장을 금지하며, '신라' 국호를 정한 왕은?", a: ["지증왕"], hint: "우산국 정벌도" },
    { period: "삼국시대", q: "이차돈의 순교를 계기로 불교를 공인하고, 율령을 반포한 신라 왕은?", a: ["법흥왕"], hint: "금관가야 병합" },
    { period: "삼국시대", q: "화랑도를 개편하고, 북한산 순수비를 세우며, 대가야를 정복한 신라 왕은?", a: ["진흥왕"], hint: "순수비" },
    { period: "삼국시대", q: "녹읍을 폐지하고 국학을 설립한 신라 왕은?", a: ["신문왕"], hint: "통일신라 체제 정비" },
    { period: "삼국시대", q: "원효대사의 아들로, 이두를 정리하고 신문왕에게 화왕계를 지어 바친 인물은?", a: ["설총"], hint: "이두 정리" },
    { period: "삼국시대", q: "당의 빈공과에 합격하고, 진성여왕에게 시무10조를 올린 6두품 출신 인물은?", a: ["최치원"], hint: "토황소격문" },
    { period: "삼국시대", q: "무애가를 부르며 불교 대중화에 힘쓰고, '일심사상'을 주장한 승려는?", a: ["원효", "원효대사"], hint: "대승기신론소, 십문화쟁론" },
    { period: "삼국시대", q: "화엄종을 개창하고 부석사를 창건한 승려는?", a: ["의상", "의상대사"], hint: "화엄일승법계도" },
    { period: "삼국시대", q: "신라의 중앙 행정 기구로, 장관을 중시(시중)라 부른 기구는?", a: ["집사부"], hint: "신라 행정의 핵심" },
    { period: "삼국시대", q: "신라에서 관리를 채용하기 위해 유교 경전 독서 능력으로 등급을 나눈 제도는?", a: ["독서삼품과"], hint: "독서 능력 평가" },
    { period: "삼국시대", q: "신라의 귀족 회의로 만장일치로 국가 중대사를 결정한 제도는?", a: ["화백회의", "화백"], hint: "만장일치" },
    { period: "삼국시대", q: "신라의 신분 제도로, 혈통에 따라 관등과 일상생활까지 제한한 것은?", a: ["골품제"], hint: "성골, 진골, 6두품..." },
    { period: "삼국시대", q: "신라 촌락 문서로, 노동력 징수와 세금 징수를 위해 작성된 것은?", a: ["민정문서"], hint: "촌락의 인구, 토지 기록" },
    { period: "삼국시대", q: "황산벌 전투에서 5천 결사대를 이끌고 싸운 백제 장군은?", a: ["계백"], hint: "5천 결사대" },
    { period: "삼국시대", q: "나당전쟁에서 신라가 당나라를 물리친 두 전투는?", a: ["매소성 기벌포", "매소성기벌포", "매소성, 기벌포", "매소성과 기벌포"], hint: "신라의 삼국 통일 완성" },

    // ===== 가야 =====
    { period: "삼국시대", q: "전기 가야 연맹을 주도하고, 낙랑과 왜에 철을 수출한 가야는?", a: ["금관가야"], hint: "김해 지역" },
    { period: "삼국시대", q: "후기 가야 연맹을 주도한 가야는?", a: ["대가야"], hint: "고령 지역" },
    { period: "삼국시대", q: "가야의 건국 신화에 나오는 노래는?", a: ["구지가"], hint: "거북아 거북아~" },

    // ===== 발해 =====
    { period: "삼국시대", q: "발해를 건국한 인물은?", a: ["대조영"], hint: "고구려 계승" },
    { period: "삼국시대", q: "당나라 산둥반도의 등주를 공격한 발해 장수는?", a: ["장문휴"], hint: "등주 공격" },
    { period: "삼국시대", q: "고구려를 계승한 나라로 '해동성국'이라 불린 국가는?", a: ["발해"], hint: "대조영 건국" },
    { period: "삼국시대", q: "발해의 행정 제도는 3성6부와 무엇으로 구성되었는가?", a: ["5경15부62주"], hint: "지방 행정 조직" },

    // ===== 후삼국 =====
    { period: "삼국시대", q: "후백제를 세우고, 공산전투에서 왕건에게 승리한 인물은?", a: ["견훤"], hint: "신검에 의해 유폐" },

    { period: "현대", q: "사사오입 개헌안과 반민족행위특별조사위원회가 관련된 대통령은?", a: ["이승만"], hint: "제1공화국" },

// ===== Quiz Logic =====
const periods = [...new Set(quizData.map(q => q.period))];
let currentFilter = "전체";
let answered = 0, score = 0;
const states = new Array(quizData.length).fill(null);

function normalize(s) {
    return s.replace(/\s+/g, '').replace(/[·,.\-\/]/g, '').toLowerCase().trim();
}

function checkAnswer(idx) {
    const input = document.getElementById('input-' + idx);
    const btn = document.getElementById('btn-' + idx);
    const fb = document.getElementById('fb-' + idx);
    const card = document.getElementById('card-' + idx);
    const userAns = normalize(input.value);
    if (!userAns) return;

    const correct = quizData[idx].a.some(a => normalize(a) === userAns);

    if (correct) {
        states[idx] = 'correct';
        score++;
        card.classList.add('correct');
        fb.textContent = '정답입니다!';
        fb.className = 'feedback show correct-fb';
    } else {
        states[idx] = 'wrong';
        card.classList.add('wrong');
        fb.textContent = '오답! 정답: ' + quizData[idx].a[0];
        fb.className = 'feedback show wrong-fb';
    }

    input.disabled = true;
    btn.disabled = true;
    answered++;

    document.getElementById('answered').textContent = answered;
    document.getElementById('score').textContent = score;

    const visibleCards = quizData.filter((q, i) =>
        (currentFilter === '전체' || q.period === currentFilter) && states[i] !== null
    ).length;
    const totalVisible = quizData.filter(q =>
        currentFilter === '전체' || q.period === currentFilter
    ).length;

    if (answered === quizData.length) showResult();
}

function showHint(idx) {
    const h = document.getElementById('hint-' + idx);
    h.classList.toggle('show');
}

function showResult() {
    const summary = document.getElementById('resultSummary');
    document.getElementById('finalScore').textContent = score;
    document.getElementById('finalTotal').textContent = quizData.length;
    const pct = Math.round(score / quizData.length * 100);
    let grade = '';
    if (pct >= 90) grade = '훌륭합니다! 한국사 마스터!';
    else if (pct >= 70) grade = '좋아요! 조금만 더 공부하면 완벽!';
    else if (pct >= 50) grade = '절반 이상! 꾸준히 복습하세요.';
    else grade = '다시 도전해 보세요!';
    document.getElementById('grade').textContent = pct + '% — ' + grade;
    summary.style.display = 'block';
    summary.scrollIntoView({ behavior: 'smooth' });
}

function filterByPeriod(period) {
    currentFilter = period;
    document.querySelectorAll('.period-btn').forEach(b => b.classList.remove('active'));
    event.target.classList.add('active');
    quizData.forEach((q, i) => {
        const card = document.getElementById('card-' + i);
        if (period === '전체' || q.period === period) {
            card.classList.remove('hidden');
        } else {
            card.classList.add('hidden');
        }
    });
}

function resetQuiz() {
    answered = 0; score = 0;
    states.fill(null);
    document.getElementById('answered').textContent = 0;
    document.getElementById('score').textContent = 0;
    document.getElementById('resultSummary').style.display = 'none';
    quizData.forEach((q, i) => {
        const input = document.getElementById('input-' + i);
        const btn = document.getElementById('btn-' + i);
        const fb = document.getElementById('fb-' + i);
        const card = document.getElementById('card-' + i);
        const hint = document.getElementById('hint-' + i);
        input.value = ''; input.disabled = false;
        btn.disabled = false;
        fb.className = 'feedback'; fb.textContent = '';
        card.className = 'question-card' + (currentFilter !== '전체' && q.period !== currentFilter ? ' hidden' : '');
        hint.classList.remove('show');
    });
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

function render() {
    const nav = document.getElementById('periodNav');
    nav.innerHTML = '<button class="period-btn active" onclick="filterByPeriod(\'전체\')">전체 (' + quizData.length + ')</button>';
    periods.forEach(p => {
        const count = quizData.filter(q => q.period === p).length;
        nav.innerHTML += '<button class="period-btn" onclick="filterByPeriod(\'' + p + '\')">' + p + ' (' + count + ')</button>';
    });

    const container = document.getElementById('quizContainer');
    container.innerHTML = '';
    quizData.forEach((q, i) => {
        container.innerHTML += '<div class="question-card" id="card-' + i + '">' +
            '<div class="q-header">' +
                '<span class="q-number">Q' + (i+1) + '</span>' +
                '<span class="q-period">' + q.period + '</span>' +
            '</div>' +
            '<div class="q-text">' + q.q + '</div>' +
            '<div class="answer-row">' +
                '<input type="text" class="answer-input" id="input-' + i + '" placeholder="답을 입력하세요" onkeydown="if(event.key===\'Enter\')checkAnswer(' + i + ')">' +
                '<button class="submit-btn" id="btn-' + i + '" onclick="checkAnswer(' + i + ')">확인</button>' +
            '</div>' +
            '<div class="feedback" id="fb-' + i + '"></div>' +
            '<button class="hint-btn" onclick="showHint(' + i + ')">힌트 보기</button>' +
            '<div class="hint-text" id="hint-' + i + '">' + q.hint + '</div>' +
        '</div>';
    });

    document.getElementById('total').textContent = quizData.length;
}

render();
</script>
